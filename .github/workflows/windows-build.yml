name: Windows build

# Build the Windows GUI exe. xafsview's engine bundles the in-process FEFF10
# backend (feff10 -> feff10-sys), which is Fortran and links only under the
# GNU/MinGW toolchain -- the MSVC linker cannot consume libgfortran. So this
# builds the x86_64-pc-windows-gnu target inside MSYS2 (MINGW64): feff10-sys
# auto-downloads its prebuilt libfeff10-windows-x86_64.a and links it
# dynamically against MinGW's libgfortran. The exe is then packaged with the
# MinGW runtime DLLs it loads, giving a no-install folder -- unzip and run on a
# clean Windows 10/11, nothing to install.
#
# The default *runtime* backend, though, is the external FEFF8.5L pipeline: the
# vendored win64 feff8l_* binaries are packaged under dist/feff8l/win64/ beside
# the exe, where the app's resolver finds them. The in-process FEFF10 backend
# stays linked but is disabled in the UI, being broken on Windows upstream
# (Ameyanagi/feff10-rs#1).
#
# Runs on every push to main (CI signal) and on release tags like `0.1.0` (the
# zip is also attached to the GitHub Release); the `test` job additionally runs
# as a gate on pull requests to main. Also on demand from the Actions tab.
on:
  push:
    branches: [main]
    tags: ['*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# A busy PR shouldn't pile up Windows minutes: a new push to the same ref cancels
# the in-flight run (matches rust.yml). Distinct tags keep distinct groups.
concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # attach the zip to the GitHub Release on tag builds

jobs:
  build:
    # Release packaging (the zip) is for main / tags / manual dispatch. On pull
    # requests only the `test` job runs as the gate, to keep Windows minutes down.
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, GNU target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MSYS2 + gfortran runtime
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc-fortran curl

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # rustup's gnu cargo links through /mingw64 (where libgfortran lives), so
      # both must precede the MSYS2 shell defaults on PATH. feff10-sys fetches
      # the prebuilt libfeff10-windows-x86_64.a via curl on first build.
      - name: Build release exe
        shell: msys2 {0}
        env:
          # Pin the prebuilt libfeff10-windows-x86_64.a to a vetted hash. With
          # this set, feff10-sys verifies the download against this constant
          # instead of the sha256sums.txt it would otherwise fetch from the same
          # release (which only catches a tampered .a, not an upstream that
          # swaps both). An upstream asset swap then fails the build instead of
          # being trusted. Update this when the feff10 dependency is bumped.
          FEFF10_LIB_SHA256: b575f0a92aaa8862b24a7326210a1c8fb42faed24cd2338bf67b547f8c8354a7
        run: |
          export PATH="/c/Users/runneradmin/.cargo/bin:/mingw64/bin:$PATH"
          cargo build --release --target x86_64-pc-windows-gnu -p xafsview

      # gfortran is linked dynamically on Windows, so the exe loads MinGW DLLs at
      # runtime. Copy the core four (always) plus anything else ldd resolves under
      # /mingw64, so the folder runs on a machine without MSYS2.
      - name: Bundle exe + MinGW runtime DLLs
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          exe=target/x86_64-pc-windows-gnu/release/xafsview.exe
          mkdir -p dist
          cp "$exe" dist/
          for dll in libgfortran-5.dll libquadmath-0.dll libgcc_s_seh-1.dll libwinpthread-1.dll; do
            src=$(find /mingw64/bin -name "$dll" -print -quit)
            [ -n "$src" ] && cp -v "$src" dist/
          done
          ldd "$exe" 2>/dev/null | awk '/\/mingw64\// {print $3}' | sort -u | while read -r dll; do
            [ -f "$dll" ] && cp -n "$dll" dist/
          done
          echo "--- dist contents ---"
          ls -la dist

      # The default backend is external FEFF8.5L; ship its vendored win64
      # binaries under dist/feff8l/win64/ (beside the exe), where the app's
      # resolver looks (`<exe_dir>/feff8l/win64/`). Each feff8l_*.exe finds its
      # co-located MinGW DLLs there. Only win64 is copied -- the linux64/darwin64
      # sets in the repo are irrelevant to the Windows zip.
      - name: Bundle FEFF8.5L win64 binaries
        shell: msys2 {0}
        run: |
          mkdir -p dist/feff8l/win64
          cp -v crates/xafsview/assets/feff8l/win64/* dist/feff8l/win64/
          echo "--- dist/feff8l/win64 contents ---"
          ls -la dist/feff8l/win64

      - name: Zip the distribution
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath xafsview-windows-x86_64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xafsview-windows-x86_64
          path: dist/
          if-no-files-found: error

      - name: Attach zip to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: xafsview-windows-x86_64.zip

  # Exercise the test suite on Windows, built for x86_64-pc-windows-gnu -- the
  # same GNU/MinGW toolchain the release exe uses (MSVC cannot link libgfortran).
  # Like the Linux gate (rust.yml), this excludes the in-process FEFF10 e2e test
  # feff10_pipeline_generates_and_parses_cu_paths: that prebuilt aborts on Windows
  # (`Fortran runtime error: Attempting to allocate already allocated variable
  # 'lrstat'`, upstream Ameyanagi/feff10-rs#1). Instead FEFF8L_DIR points the
  # feff8l pipeline test at the vendored win64 binaries, so the *default* backend
  # is what gets proven on Windows. Independent of `build` (no `needs:`), so a red
  # test never blocks the release zip. Runs on the same events as `build`.
  test:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, GNU target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MSYS2 + gfortran runtime
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc-fortran curl

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Same PATH/pin as the build step: the test binaries link feff10-sys ->
      # libgfortran under /mingw64, and feff10-sys fetches the prebuilt
      # libfeff10-windows-x86_64.a (verified against this hash) on first build.
      # FEFF8L_DIR points the feff8l pipeline test at the vendored win64 exes;
      # the broken feff10 e2e test is skipped (see the job comment above).
      # --nocapture surfaces that test's "RAN feff8l pipeline: N feffNNNN.dat"
      # stderr line (and, if it ever regressed, its "SKIP" line), so the log
      # proves feff8l actually ran on Windows rather than self-skipping — which
      # would otherwise still count as a green pass.
      - name: Test workspace (GNU target)
        shell: msys2 {0}
        env:
          FEFF10_LIB_SHA256: b575f0a92aaa8862b24a7326210a1c8fb42faed24cd2338bf67b547f8c8354a7
          FEFF8L_DIR: ${{ github.workspace }}/crates/xafsview/assets/feff8l/win64
        run: |
          export PATH="/c/Users/runneradmin/.cargo/bin:/mingw64/bin:$PATH"
          cargo test --workspace --target x86_64-pc-windows-gnu -- --nocapture --skip feff10_pipeline_generates_and_parses_cu_paths
