name: Windows build

# Build the self-contained Windows GUI exe. The .cargo/config.toml in the repo
# statically links the MSVC CRT for this target, so the artifact runs on a clean
# Windows 10/11 with nothing to install. Runs on every push to main (CI signal),
# on release tags like `0.1.0` (also attached to the GitHub Release), and on
# demand from the Actions tab.
on:
  push:
    branches: [main]
    tags: ['*.*.*']
  workflow_dispatch:

permissions:
  contents: write # attach the exe to the GitHub Release on tag builds

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # .cargo/config.toml applies `-C target-feature=+crt-static` to this
      # target, so the exe needs no Visual C++ Redistributable on the user's PC.
      - name: Build release exe
        run: cargo build --release -p xafsview

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: xafsview-windows-x86_64
          path: target/release/xafsview.exe
          if-no-files-found: error

      - name: Attach exe to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/xafsview.exe
