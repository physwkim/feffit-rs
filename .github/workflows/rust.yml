name: Rust

# Lint + test gate on Linux x86_64 (the canonical target), modelled on
# epics-rs's rust.yml: rustfmt, clippy -D warnings, a full workspace build,
# nextest, and doctests. The Windows GUI packaging build lives in
# windows-build.yml.
#
# One system library is installed: libcups. siplot's `print` dialog pulls the
# `printers` crate, which `#[link]`s libcups on Linux, so the xafsview binary
# needs libcups.so at link time (the Build/Test steps, not Clippy). Everything
# else links nothing at build time:
#   - The GUI stack (egui/eframe/wgpu/winit) loads X11 / Wayland / xkbcommon via
#     dlopen at runtime (x11rb is pure Rust); arboard's clipboard is pure Rust.
#   - rfd's default xdg-portal backend needs no GTK.
#   - feffit's default `feff10` feature pulls feff10-sys, which downloads the
#     self-contained prebuilt libfeff10-linux-x86_64.a from the feff10-rs
#     release (libgfortran/quadmath merged in), so the link needs no gfortran.
# The unit tests are pure logic (no window / GPU / render context), so nextest
# runs headless.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A new push to the same ref cancels the in-flight run.
concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Pin the prebuilt libfeff10-linux-x86_64.a to a vetted hash — the same policy
  # windows-build.yml applies to the Windows .a. With this set, feff10-sys
  # verifies the download against this constant instead of the sha256sums.txt it
  # would otherwise fetch from the same release (which only catches a tampered
  # .a, not an upstream that swaps both). An upstream asset swap then fails the
  # build instead of being trusted. Update this when the feff10 dep is bumped.
  FEFF10_LIB_SHA256: dc6fe339d55275de70c7326a7c0890a10d2aba2143333f79cfda93278db7a410

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # siplot's print dialog -> `printers` crate #[link]s libcups on Linux, so
      # the xafsview binary needs libcups.so to link. -dev supplies the .so
      # symlink for -lcups.
      - name: Install Linux system libraries
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test (nextest)
        # Excludes one heavy end-to-end test: `feff10_pipeline_generates_and_
        # parses_cu_paths` drives the in-process FEFF10 Fortran engine. On the
        # Linux runner the linux-x86_64 prebuilt runs but writes no feffNNNN.dat
        # (FeffError::NoOutput), though it passes locally on macOS — a FEFF10
        # linux-prebuilt runtime issue tracked separately, not a feffit
        # regression. Every unit + larch-parity test still runs; the feff8l
        # sibling self-skips when no FEFF8L binaries are present.
        run: cargo nextest run --workspace -E 'not test(feff10_pipeline_generates_and_parses_cu_paths)'

      - name: Doctests
        run: cargo test --doc --workspace

      # feffit's in-process FEFF10 backend is an optional feature; prove the
      # library still compiles and tests with it off (this path pulls no Fortran
      # prebuilt at all).
      - name: Test feffit without the feff10 backend
        run: cargo nextest run -p feffit --no-default-features --features spacegroup
